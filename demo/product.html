<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CausalFunnel Demo Store — Product</title>
  <style>
    :root {
      --bg: #0F172A;
      --navbar: #1E293B;
      --card-bg: #1E293B;
      --primary: #38BDF8;
      --primary-hover: #0284C7;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --border: #334155;
      --success: #10B981;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Header */

    header {
      background: var(--navbar);
      color: white;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      color: var(--primary);
    }

    nav a {
      color: #CBD5E1;
      text-decoration: none;
      margin-left: 20px;
      font-size: 15px;
      transition: 0.3s;
    }

    nav a:hover {
      color: var(--primary);
    }

    /* Main */

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    /* Product Card */

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 45px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .3);
    }

    .product-card .emoji {
      font-size: 90px;
      margin-bottom: 20px;
    }

    .product-card h2 {
      font-size: 30px;
      margin: 10px 0;
      color: var(--text);
      text-transform: capitalize;
    }

    .product-card .price {
      font-size: 28px;
      color: var(--success);
      font-weight: 700;
      margin-bottom: 30px;
    }

    /* Quantity Row */

    .qty-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .qty-row span {
      font-size: 20px;
      font-weight: 600;
    }

    .qty-row button {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0F172A;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      transition: .3s;
    }

    .qty-row button:hover {
      background: var(--primary);
    }

    /* Buttons */

    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: .3s;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
      margin-left: 15px;
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
    }

    /* Status Pill */

    #status-pill {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--card-bg);
      color: var(--success);
      border: 1px solid var(--border);
      font-size: 12px;
      padding: 10px 16px;
      border-radius: 25px;
      font-family: monospace;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .3);
    }

    /* Mobile */

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 15px;
      }

      .product-card {
        padding: 30px;
      }

      .product-card h2 {
        font-size: 24px;
      }

      .product-card .emoji {
        font-size: 70px;
      }

      .btn {
        width: 100%;
        margin-bottom: 12px;
      }

      .btn-secondary {
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>🛍️ MetricMart</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="product.html">Product</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <main>
    <div class="product-card">
      <div class="emoji" id="product-emoji">📦</div>
      <h2 id="product-name">Product</h2>
      <div class="price" id="product-price">$0.00</div>
      <div class="qty-row">
        <button id="qty-dec">−</button>
        <span id="qty-val">1</span>
        <button id="qty-inc">+</button>
      </div>
      <button class="btn" id="add-to-cart">Add to Cart</button>
      <button class="btn btn-secondary" id="buy-now">Buy Now</button>
    </div>
  </main>

  <div id="status-pill">session: loading…</div>

  <script src="tracker.js" data-api-url="https://metricmart.onrender.com/api/events"></script>
  <script>
    var PRODUCTS = {
      sneakers: { emoji: '👟', name: 'Running Sneakers', price: 79.99 },
      backpack: { emoji: '🎒', name: 'Travel Backpack', price: 54.99 },
      headphones: { emoji: '🎧', name: 'Wireless Headphones', price: 129.99 },
      watch: { emoji: '⌚', name: 'Smart Watch', price: 199.99 },
    };

    var params = new URLSearchParams(window.location.search);
    var item = params.get('item') || 'sneakers';
    var product = PRODUCTS[item] || PRODUCTS.sneakers;

    document.getElementById('product-emoji').textContent = product.emoji;
    document.getElementById('product-name').textContent = product.name;
    document.getElementById('product-price').textContent = '$' + product.price.toFixed(2);

    var qty = 1;
    document.getElementById('qty-inc').addEventListener('click', function () {
      qty++;
      document.getElementById('qty-val').textContent = qty;
    });
    document.getElementById('qty-dec').addEventListener('click', function () {
      qty = Math.max(1, qty - 1);
      document.getElementById('qty-val').textContent = qty;
    });

    document.getElementById('buy-now').addEventListener('click', function () {
      window.location.href = 'checkout.html?item=' + item + '&qty=' + qty;
    });
    document.getElementById('add-to-cart').addEventListener('click', function () {
      alert('Added ' + qty + ' x ' + product.name + ' to cart!');
    });

    window.addEventListener('load', function () {
      var pill = document.getElementById('status-pill');
      if (window.cfAnalytics) {
        pill.textContent = 'session: ' + window.cfAnalytics.sessionId.slice(0, 13) + '…';
      }
    });
  </script>
</body>

</html>
